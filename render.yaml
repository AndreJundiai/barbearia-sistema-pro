services:
  - type: web
    name: barbearia-pro-sistema
    env: docker
    plan: free
    region: ohio
    envVars:
      - key: APP_KEY
        sync: false # O Render solicitará a chave correta ou usará a definida no Dashboard
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: barbearia-db
          property: connectionString
      - key: APP_URL
        sync: false # O Render solicitará a URL final ou você pode preencher manualmente
      - key: SESSION_DRIVER
        value: cookie
      - key: APP_LOCALE
        value: pt_BR
      - key: LOG_CHANNEL
        value: stderr

databases:
  - name: barbearia-db
    plan: free
    region: ohio
